<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إعادة تعيين كلمة المرور — سِحر البيان</title>
<style>
  :root{--green:#0E463F;--green2:#0E332C;--gold:#C9A24B;--goldlt:#E6D2A3;--bg:#0E332C;--ink:#23312E;--muted:#5f6b66}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink);
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#FBF7EE;max-width:430px;width:100%;border-radius:20px;overflow:hidden;
        box-shadow:0 10px 34px rgba(0,0,0,.35);border:1px solid var(--goldlt)}
  .head{background:linear-gradient(135deg,#15746A,#0E463F,#0A2E29);color:#fff;padding:26px;text-align:center;
        border-bottom:2px solid var(--gold)}
  .head .t{color:var(--gold);font-size:22px;font-weight:bold;letter-spacing:.5px}
  .head .s{opacity:.85;font-size:13px;margin-top:5px}
  .body{padding:26px}
  h1{font-size:18px;color:var(--green);margin:0 0 16px}
  label{display:block;font-size:14px;margin:14px 0 6px;color:var(--muted);font-weight:bold}
  input{width:100%;padding:12px 14px;border:1px solid #dcd3c2;border-radius:12px;font-size:15px;background:#fff}
  input:focus{outline:none;border-color:var(--green)}
  button{width:100%;margin-top:22px;background:var(--green);color:#fff;border:0;border-radius:30px;
         padding:14px;font-size:16px;font-weight:bold;cursor:pointer}
  button:hover{background:#0A2E29}
  button:disabled{opacity:.6;cursor:default}
  .msg{margin-top:16px;padding:12px;border-radius:12px;font-size:14px;display:none;line-height:1.8}
  .ok{background:#e8f5e9;color:#1b5e20;border:1px solid #66bb6a}
  .err{background:#fdecea;color:#b3261e;border:1px solid #ef5350}
  .hint{margin-top:14px;font-size:12.5px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="t">سِحر البيان</div>
    <div class="s">موسوعة الشعر العربي والخواطر</div>
  </div>
  <div class="body">
    <h1>تعيين كلمة مرور جديدة</h1>
    <div id="form-area">
      <label for="p1">كلمة المرور الجديدة</label>
      <input id="p1" type="password" autocomplete="new-password" placeholder="٦ أحرف على الأقل">
      <label for="p2">تأكيد كلمة المرور</label>
      <input id="p2" type="password" autocomplete="new-password">
      <button id="btn">حفظ كلمة المرور</button>
      <div class="hint">بعد الحفظ، عُد إلى التطبيق وسجّل الدخول بكلمتك الجديدة.</div>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>

<script>
  var SUPABASE_URL = "https://dyqcyxvnraauwnovpitr.supabase.co";
  var ANON_KEY = "sb_publishable_8BJ6cwPw4gozYF4jOlsrSQ_XwbPlkml";

  var params = new URLSearchParams(window.location.hash.substring(1));
  var accessToken = params.get("access_token");
  var type = params.get("type");
  var errDesc = params.get("error_description");

  var msg = document.getElementById("msg");
  var btn = document.getElementById("btn");
  function show(text, cls){ msg.textContent = text; msg.className = "msg " + cls; msg.style.display = "block"; }
  function hideForm(){ document.getElementById("form-area").style.display = "none"; }

  if (errDesc) {
    hideForm();
    show("انتهت صلاحية الرابط أو أنه غير صالح. اطلب رابطاً جديداً من التطبيق.", "err");
  } else if (!accessToken || type !== "recovery") {
    hideForm();
    show("افتح هذه الصفحة من رابط إعادة التعيين المُرسَل إلى بريدك.", "err");
  }

  btn.addEventListener("click", function(){
    var p1 = document.getElementById("p1").value;
    var p2 = document.getElementById("p2").value;
    if (p1.length < 6) { show("كلمة المرور ٦ أحرف على الأقل.", "err"); return; }
    if (p1 !== p2) { show("كلمتا المرور غير متطابقتين.", "err"); return; }
    btn.disabled = true; btn.textContent = "جارٍ الحفظ...";
    fetch(SUPABASE_URL + "/auth/v1/user", {
      method: "PUT",
      headers: {
        "apikey": ANON_KEY,
        "Authorization": "Bearer " + accessToken,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ password: p1 })
    }).then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
      .then(function(res){
        if (res.ok) {
          hideForm();
          show("تم تغيير كلمة المرور بنجاح ✅ يمكنك الآن العودة إلى التطبيق وتسجيل الدخول.", "ok");
        } else {
          btn.disabled = false; btn.textContent = "حفظ كلمة المرور";
          show((res.d && (res.d.msg || res.d.error_description || res.d.message)) || "تعذّر تغيير كلمة المرور.", "err");
        }
      }).catch(function(){
        btn.disabled = false; btn.textContent = "حفظ كلمة المرور";
        show("تعذّر الاتصال. حاول مجدداً.", "err");
      });
  });
</script>
</body>
</html>
